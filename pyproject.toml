[project]
name = "stock-indicators"
version = "0.1.0"
description = "Stock technical indicators dashboard with AI analysis"
requires-python = ">=3.11"
dependencies = [
    "fastapi==0.115.2",
    "uvicorn==0.32.0",
    "sqlalchemy==2.0.36",
    "databases[aiosqlite]==0.9.0",
    "aiosqlite==0.20.0",
    "pydantic==2.9.2",
    "fakeredis==2.25.1",
    "redis==5.1.1",
    "httpx>=0.27.0",
    "yfinance==0.2.44",
    "ta==0.11.0",
    "pandas==2.2.3",
    "numpy==2.1.2",
    "beautifulsoup4==4.12.3",
    "lxml==5.3.0",
    "requests==2.32.3",
    "python-dateutil==2.9.0.post0",
]

[dependency-groups]
dev = ["pre-commit"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backend"]
