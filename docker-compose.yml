services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./stock_data.duckdb:/app/stock_data.duckdb
      - ./backups:/app/backups
    environment:
      - DB_PATH=/app/stock_data.duckdb
      - BACKUP_DIR=/app/backups
      - PORT=8000
      - AUTO_SYNC_ON_START=true
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
